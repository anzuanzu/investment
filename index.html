<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Investment Morning Briefs</title>
  <style>
    :root {
      --bg: #f5efe5;
      --card: #fffdf9;
      --ink: #211b18;
      --muted: #6d625c;
      --line: #dacfc3;
      --accent: #0f766e;
    }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top right, rgba(15,118,110,0.08), transparent 30%),
        linear-gradient(180deg, #efe6d7 0%, var(--bg) 100%);
      color: var(--ink);
      font: 16px/1.6 "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    }
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 24px 72px;
    }
    .hero, .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 48px rgba(42, 31, 24, 0.07);
    }
    h1, h2 { margin: 0 0 12px; }
    h1 { font-size: 36px; line-height: 1.1; }
    p { color: var(--muted); }
    ul { padding-left: 22px; }
    li + li { margin-top: 10px; }
    a { color: var(--accent); text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
    .meta { font-size: 14px; }
    .stack { display: grid; gap: 20px; margin-top: 24px; }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>Investment Morning Briefs</h1>
      <p>Browse the published daily HTML morning briefs by date.</p>
      <p class="meta">Latest local sync: 2026-05-31 18:12 +0800</p>
    </section>
    <section class="panel stack">
      <div>
        <h2>Daily Reports</h2>
        <ul>
          <li><a href="reports/2026-05-31.html">2026-05-31</a></li>
        </ul>
      </div>
    </section>
  </main>
</body>
</html>
